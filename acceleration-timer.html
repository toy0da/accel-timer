<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>0-100 加速タイマー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    min-height: 100vh;
    background: #000;
    color: #fff;
    font-family: "Bricolage Grotesque", -apple-system, sans-serif;
    overscroll-behavior: none;
  }
  body {
    background: radial-gradient(ellipse at top, #0a0e1a 0%, #000000 70%);
    padding: 20px 16px 40px;
    padding-top: max(20px, env(safe-area-inset-top));
  }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .title-small { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.3em; color: #6B7280; font-weight: 700; }
  .title { font-size: 22px; font-weight: 800; margin-top: 2px; letter-spacing: -0.02em; }
  .version { font-family: "JetBrains Mono", monospace; font-size: 9px; color: #4B5563; letter-spacing: 0.1em; margin-top: 4px; font-weight: 600; }
  .gps-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #9CA3AF; font-family: "JetBrains Mono", monospace; margin-top: 6px; }
  .gps-dot { width: 6px; height: 6px; border-radius: 50%; background: #6B7280; box-shadow: 0 0 6px #6B7280; transition: all 0.3s; }

  .state-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 32px; font-family: "JetBrains Mono", monospace; transition: all 0.3s; }
  .state-dot { width: 6px; height: 6px; border-radius: 50%; }
  .state-dot.pulse { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .speed-block { text-align: center; margin-bottom: 28px; }
  .label { font-family: "JetBrains Mono", monospace; font-size: 9px; letter-spacing: 0.4em; color: #6B7280; font-weight: 700; margin-bottom: 4px; }
  .speed-number { font-family: "JetBrains Mono", monospace; font-size: 96px; font-weight: 800; line-height: 1; letter-spacing: -0.05em; color: #fff; font-variant-numeric: tabular-nums; transition: color 0.2s, text-shadow 0.3s; }
  .speed-number.over100 { color: #34D399; }
  .speed-number.running { text-shadow: 0 0 40px rgba(34, 211, 238, 0.2); }
  .unit-small { font-family: "JetBrains Mono", monospace; font-size: 12px; color: #6B7280; font-weight: 700; letter-spacing: 0.2em; margin-top: 4px; }

  .timer-block { text-align: center; margin-bottom: 20px; padding: 24px 16px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; transition: all 0.3s; }
  .timer-block.running { background: rgba(34, 211, 238, 0.06); border-color: rgba(34, 211, 238, 0.3); }
  .timer-block.finished { border-color: rgba(52, 211, 153, 0.3); }
  .timer-number { font-family: "JetBrains Mono", monospace; font-size: 64px; font-weight: 800; line-height: 1; letter-spacing: -0.04em; color: #374151; font-variant-numeric: tabular-nums; transition: color 0.3s; }
  .timer-block.running .timer-number { color: #22D3EE; }
  .timer-block.finished .timer-number { color: #34D399; }
  .unit-tiny { font-family: "JetBrains Mono", monospace; font-size: 11px; color: #6B7280; font-weight: 700; letter-spacing: 0.2em; margin-top: 6px; }

  .splits { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 28px; }
  .split { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 14px 8px; text-align: center; transition: all 0.3s; }
  .split.done { background: rgba(52, 211, 153, 0.06); border-color: rgba(52, 211, 153, 0.2); }
  .split-label { font-family: "JetBrains Mono", monospace; font-size: 10px; font-weight: 700; color: #6B7280; letter-spacing: 0.1em; margin-bottom: 6px; }
  .split.done .split-label { color: #34D399; }
  .split-value { font-family: "JetBrains Mono", monospace; font-size: 22px; font-weight: 800; color: #374151; font-variant-numeric: tabular-nums; }
  .split.done .split-value { color: #fff; }

  .btn-action { width: 100%; padding: 20px; background: linear-gradient(135deg, #22D3EE 0%, #06B6D4 100%); border: none; color: #000; font-size: 15px; font-weight: 800; letter-spacing: 0.15em; border-radius: 16px; cursor: pointer; font-family: "Bricolage Grotesque", sans-serif; text-transform: uppercase; transition: all 0.2s; margin-bottom: 14px; box-shadow: 0 8px 24px rgba(34, 211, 238, 0.25); }
  .btn-action:active { transform: scale(0.98); }
  .btn-action.stop { background: transparent; border: 1px solid rgba(248, 113, 113, 0.4); color: #F87171; box-shadow: none; }

  .message { text-align: center; font-size: 13px; padding: 12px; border-radius: 12px; margin-bottom: 20px; }
  .message.warning { color: #FCD34D; background: rgba(252, 211, 77, 0.08); }
  .message.success { color: #34D399; background: rgba(52, 211, 153, 0.08); font-weight: 700; font-size: 14px; }
  .message.error { color: #F87171; background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.3); text-align: left; }

  .history-section { margin-top: 36px; }
  .history-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 8px 0; user-select: none; }
  .history-title { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.3em; color: #9CA3AF; font-weight: 700; }
  .history-toggle { color: #6B7280; font-size: 14px; font-family: "JetBrains Mono", monospace; }

  .history-list { margin-top: 12px; }
  .history-empty { color: #4B5563; font-size: 13px; text-align: center; padding: 24px; }
  .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .history-time-row { display: flex; align-items: baseline; gap: 8px; }
  .history-time { font-family: "JetBrains Mono", monospace; font-size: 22px; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; }
  .history-time.best { color: #FCD34D; }
  .badge-best { font-size: 9px; color: #FCD34D; font-weight: 800; letter-spacing: 0.2em; font-family: "JetBrains Mono", monospace; padding: 2px 6px; background: rgba(252, 211, 77, 0.15); border-radius: 4px; }
  .history-splits { font-size: 11px; color: #6B7280; font-family: "JetBrains Mono", monospace; margin-top: 2px; }
  .history-date { font-size: 10px; color: #6B7280; font-family: "JetBrains Mono", monospace; text-align: right; line-height: 1.4; }

  .btn-clear { margin-top: 14px; width: 100%; padding: 10px; background: transparent; border: 1px solid rgba(255,255,255,0.08); color: #6B7280; font-size: 11px; border-radius: 8px; cursor: pointer; font-family: "JetBrains Mono", monospace; letter-spacing: 0.1em; transition: all 0.2s; }
  .btn-clear.confirm { background: rgba(248, 113, 113, 0.1); border-color: rgba(248, 113, 113, 0.4); color: #F87171; }

  .note { margin-top: 32px; padding: 14px 16px; background: rgba(255,255,255,0.02); border-radius: 12px; font-size: 11px; color: #6B7280; line-height: 1.6; }
  .note-label { font-weight: 700; color: #9CA3AF; margin-bottom: 4px; font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.15em; }

  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="header">
    <div>
      <div class="title-small">0 → 100 KM/H</div>
      <div class="title">加速タイマー</div>
      <div class="version" id="versionInfo"></div>
    </div>
    <div class="gps-indicator">
      <div class="gps-dot" id="gpsDot"></div>
      <span>GPS <span id="gpsAccuracy">--</span></span>
    </div>
  </div>

  <div class="state-badge" id="stateBadge" style="background: rgba(107,114,128,0.1); border: 1px solid rgba(107,114,128,0.3); color: #6B7280;">
    <div class="state-dot" id="stateDot" style="background: #6B7280;"></div>
    <span id="stateLabel">待機中</span>
  </div>

  <div class="speed-block">
    <div class="label">CURRENT SPEED</div>
    <div class="speed-number" id="speedNumber">0</div>
    <div class="unit-small">KM/H</div>
  </div>

  <div class="timer-block" id="timerBlock">
    <div class="label">ELAPSED</div>
    <div class="timer-number" id="timerNumber">0.00</div>
    <div class="unit-tiny">SEC</div>
  </div>

  <div class="splits" id="splits"></div>

  <button class="btn-action" id="btnAction">計測開始</button>

  <div class="message warning hidden" id="msgArmed">停車状態から発進してください</div>
  <div class="message success hidden" id="msgFinished"></div>
  <div class="message error hidden" id="msgError"></div>

  <div class="history-section">
    <div class="history-header" id="historyHeader">
      <div class="history-title">履歴 [<span id="historyCount">0</span>]</div>
      <div class="history-toggle" id="historyToggle">+</div>
    </div>
    <div class="history-list hidden" id="historyList"></div>
  </div>

  <div class="note">
    <div class="note-label">NOTE</div>
    GPSの精度・更新頻度に依存するため、専用機材とは多少誤差があります。安全な場所で交通法規を守って計測してください。
  </div>

<script>
'use strict';

const VERSION = 'v0.6.0';
const BUILD_DATE = '2026-05-19';

const STATES = {
  IDLE: 'idle',
  ARMING: 'arming',
  ARMED: 'armed',
  RUNNING: 'running',
  FINISHED: 'finished'
};
const SPLIT_TARGETS = [50, 80, 100];
const START_THRESHOLD_KMH = 1.5;
const TARGET_KMH = 100;
const STORAGE_KEY = 'accel_history_v1';

const app = {
  state: STATES.IDLE,
  speed: 0,
  elapsedMs: 0,
  splits: {},
  history: [],
  accuracy: null,
  startTime: null,
  watchId: null,
  lastSample: null,
  rafId: null,
  wakeLock: null,
  confirmClear: false,
  confirmClearTimer: null,
  showHistory: false,
};

function loadHistory() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) app.history = JSON.parse(raw);
  } catch (e) {}
}
function saveHistory() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(app.history)); } catch (e) {}
}

async function acquireWakeLock() {
  try { if ('wakeLock' in navigator) app.wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
}
async function releaseWakeLock() {
  if (app.wakeLock) { try { await app.wakeLock.release(); } catch (e) {} app.wakeLock = null; }
}

function startMeasurement() {
  if (!navigator.geolocation) {
    showError('お使いの端末はGPSに対応していません');
    return;
  }
  if (!window.isSecureContext) {
    showError('GPSはHTTPSまたはfile://環境でのみ動作します。');
    return;
  }
  hideError();
  setState(STATES.ARMING);
  app.speed = 0;
  app.elapsedMs = 0;
  app.splits = {};
  app.startTime = null;
  app.lastSample = null;
  render();

  if (app.watchId !== null) navigator.geolocation.clearWatch(app.watchId);

  app.watchId = navigator.geolocation.watchPosition(
    function(pos) {
      if (app.state === STATES.ARMING) {
        setState(STATES.ARMED);
      }
      handlePosition(pos);
    },
    function(err) {
      let msg = 'GPSエラー';
      if (err.code === 1) msg = '位置情報のアクセスが拒否されました。';
      else if (err.code === 2) msg = '現在位置を取得できません。屋外でお試しください。';
      else if (err.code === 3) msg = 'GPS取得がタイムアウトしました。';
      else msg = 'GPSエラー: ' + err.message;
      showError(msg);
      setState(STATES.IDLE);
    },
    { enableHighAccuracy: true, maximumAge: 0, timeout: 30000 }
  );

  acquireWakeLock();
}

function stopMeasurement() {
  if (app.watchId !== null) {
    navigator.geolocation.clearWatch(app.watchId);
    app.watchId = null;
  }
  setState(STATES.IDLE);
  app.speed = 0;
  app.elapsedMs = 0;
  releaseWakeLock();
  render();
}

function handlePosition(pos) {
  const speedMs = pos.coords.speed;
  app.accuracy = pos.coords.accuracy;

  if (speedMs === null || speedMs === undefined || speedMs < 0) {
    renderGPS();
    return;
  }

  const speedKmh = speedMs * 3.6;
  app.speed = speedKmh;
  const now = performance.now();

  if (app.state === STATES.ARMED) {
    if (speedKmh >= START_THRESHOLD_KMH) {
      let startTime = now;
      if (app.lastSample && app.lastSample.speedKmh < START_THRESHOLD_KMH) {
        startTime = app.lastSample.time;
      }
      app.startTime = startTime;
      app.splits = {};
      setState(STATES.RUNNING);
    }
  } else if (app.state === STATES.RUNNING) {
    for (const target of SPLIT_TARGETS) {
      if (app.splits[target] === undefined && speedKmh >= target) {
        let crossTime = now;
        if (app.lastSample && app.lastSample.speedKmh < target) {
          const prev = app.lastSample;
          const fraction = (target - prev.speedKmh) / (speedKmh - prev.speedKmh);
          crossTime = prev.time + fraction * (now - prev.time);
        }
        const splitMs = crossTime - app.startTime;
        app.splits[target] = splitMs;
        if (target === TARGET_KMH) {
          app.elapsedMs = splitMs;
          setState(STATES.FINISHED);
          saveResult(splitMs, Object.assign({}, app.splits));
        }
      }
    }
  }

  app.lastSample = { speedKmh: speedKmh, time: now };
  render();
}

function saveResult(finalMs, allSplits) {
  const entry = { id: Date.now(), time: finalMs, splits: allSplits, date: new Date().toISOString() };
  app.history = [entry].concat(app.history).slice(0, 20);
  saveHistory();
  releaseWakeLock();
}

function setState(newState) {
  app.state = newState;
  if (newState === STATES.RUNNING) {
    rafLoop();
  } else if (app.rafId) {
    cancelAnimationFrame(app.rafId);
    app.rafId = null;
  }
  render();
}

function rafLoop() {
  if (app.state !== STATES.RUNNING) return;
  if (app.startTime !== null) {
    app.elapsedMs = performance.now() - app.startTime;
    renderTimer();
  }
  app.rafId = requestAnimationFrame(rafLoop);
}

const $ = function(id) { return document.getElementById(id); };

function formatTime(ms) { return (ms / 1000).toFixed(2); }

function renderGPS() {
  const acc = app.accuracy;
  const color = !acc ? '#6B7280' : acc < 10 ? '#34D399' : acc < 30 ? '#FCD34D' : '#F87171';
  const dot = $('gpsDot');
  dot.style.background = color;
  dot.style.boxShadow = '0 0 6px ' + color;
  $('gpsAccuracy').textContent = acc ? '±' + acc.toFixed(0) + 'm' : '--';
}

function renderState() {
  const labels = {
    'idle': '待機中',
    'arming': 'GPS取得中',
    'armed': '発進待ち',
    'running': '計測中',
    'finished': '完了'
  };
  const colors = {
    'idle': '#6B7280',
    'arming': '#FCD34D',
    'armed': '#FCD34D',
    'running': '#22D3EE',
    'finished': '#34D399'
  };
  const c = colors[app.state];
  $('stateLabel').textContent = labels[app.state];
  const badge = $('stateBadge');
  badge.style.background = c + '15';
  badge.style.borderColor = c + '40';
  badge.style.color = c;
  const dot = $('stateDot');
  dot.style.background = c;
  dot.classList.toggle('pulse', app.state === STATES.RUNNING || app.state === STATES.ARMED);

  $('msgArmed').classList.toggle('hidden', app.state !== STATES.ARMED);
  if (app.state === STATES.FINISHED) {
    $('msgFinished').textContent = '🏁 計測完了 — ' + formatTime(app.elapsedMs) + '秒';
    $('msgFinished').classList.remove('hidden');
  } else {
    $('msgFinished').classList.add('hidden');
  }

  const btn = $('btnAction');
  if (app.state === STATES.IDLE || app.state === STATES.FINISHED) {
    btn.textContent = app.state === STATES.FINISHED ? 'もう一度' : '計測開始';
    btn.classList.remove('stop');
  } else if (app.state === STATES.ARMING) {
    btn.textContent = 'GPS取得中...';
    btn.classList.add('stop');
  } else {
    btn.textContent = '中断';
    btn.classList.add('stop');
  }

  const tb = $('timerBlock');
  tb.classList.toggle('running', app.state === STATES.RUNNING);
  tb.classList.toggle('finished', app.state === STATES.FINISHED);
}

function renderSpeed() {
  const sn = $('speedNumber');
  sn.textContent = Math.round(app.speed);
  sn.classList.toggle('over100', app.speed >= 100);
  sn.classList.toggle('running', app.state === STATES.RUNNING);
}

function renderTimer() {
  $('timerNumber').textContent = formatTime(app.elapsedMs);
}

function renderSplits() {
  const container = $('splits');
  container.innerHTML = SPLIT_TARGETS.map(function(t) {
    const has = app.splits[t] !== undefined;
    return '<div class="split' + (has ? ' done' : '') + '">' +
      '<div class="split-label">0→' + t + '</div>' +
      '<div class="split-value">' + (has ? formatTime(app.splits[t]) : '—.——') + '</div>' +
    '</div>';
  }).join('');
}

function renderHistory() {
  $('historyCount').textContent = app.history.length;
  $('historyToggle').textContent = app.showHistory ? '−' : '+';
  const list = $('historyList');
  list.classList.toggle('hidden', !app.showHistory);
  if (!app.showHistory) return;

  if (app.history.length === 0) {
    list.innerHTML = '<div class="history-empty">記録がありません</div>';
    return;
  }
  const best = Math.min.apply(null, app.history.map(function(h){return h.time;}));
  let html = app.history.map(function(e) {
    const date = new Date(e.date);
    const isBest = e.time === best;
    const md = date.toLocaleDateString('ja-JP', { month: '2-digit', day: '2-digit' });
    const hm = date.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    const s50 = e.splits && e.splits[50] !== undefined ? formatTime(e.splits[50]) : '—';
    const s80 = e.splits && e.splits[80] !== undefined ? formatTime(e.splits[80]) : '—';
    return '<div class="history-item">' +
      '<div>' +
        '<div class="history-time-row">' +
          '<div class="history-time' + (isBest ? ' best' : '') + '">' + formatTime(e.time) + 's</div>' +
          (isBest ? '<span class="badge-best">BEST</span>' : '') +
        '</div>' +
        '<div class="history-splits">50: ' + s50 + ' · 80: ' + s80 + '</div>' +
      '</div>' +
      '<div class="history-date">' + md + '<br>' + hm + '</div>' +
    '</div>';
  }).join('');
  html += '<button class="btn-clear' + (app.confirmClear ? ' confirm' : '') + '" id="btnClear">' +
    (app.confirmClear ? 'もう一度タップで削除' : '履歴を削除') + '</button>';
  list.innerHTML = html;
  $('btnClear').onclick = handleClearHistory;
}

function render() {
  renderGPS();
  renderState();
  renderSpeed();
  renderTimer();
  renderSplits();
  renderHistory();
}

function showError(msg) { const m = $('msgError'); m.textContent = msg; m.classList.remove('hidden'); }
function hideError() { $('msgError').classList.add('hidden'); }

function handleClearHistory() {
  if (!app.confirmClear) {
    app.confirmClear = true;
    renderHistory();
    if (app.confirmClearTimer) clearTimeout(app.confirmClearTimer);
    app.confirmClearTimer = setTimeout(function() { app.confirmClear = false; renderHistory(); }, 3000);
    return;
  }
  app.history = [];
  saveHistory();
  app.confirmClear = false;
  if (app.confirmClearTimer) clearTimeout(app.confirmClearTimer);
  renderHistory();
}

$('btnAction').addEventListener('click', function() {
  if (app.state === STATES.IDLE || app.state === STATES.FINISHED) startMeasurement();
  else stopMeasurement();
});
$('historyHeader').addEventListener('click', function() {
  app.showHistory = !app.showHistory;
  renderHistory();
});

document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible' &&
      (app.state === STATES.ARMED || app.state === STATES.RUNNING)) {
    acquireWakeLock();
  }
});

loadHistory();
$('versionInfo').textContent = VERSION + ' · ' + BUILD_DATE;
render();
</script>
</body>
</html>
